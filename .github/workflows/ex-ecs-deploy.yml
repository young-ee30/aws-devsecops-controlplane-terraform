name: Manual Deploy to ECS

on:
  workflow_dispatch:
    inputs:
      service-name:
        description: '배포할 서비스 이름 (예: api-node, frontend)'
        required: true
        default: 'api-node'
        type: choice
        options:
          - api-node
          - frontend
      working-directory:
        description: 'Dockerfile이 위치한 경로'
        required: true
        default: './services/ecommerce-app-node/api-server'
      ecr-repository:
        description: 'ECR 리포지토리 이름'
        required: true
        default: 'devsecops-dev/api-node'
      ecs-service:
        description: 'ECS 서비스 이름'
        required: true
        default: 'devsecops-dev-api-node'
      ecs-cluster:
        description: 'ECS 클러스터 이름'
        required: true
        default: 'devsecops-dev-cluster'
      container-name:
        description: 'Task Definition 내의 컨테이너 이름'
        required: true
        default: 'api-node'
      task-definition-family:
        description: 'ECS Task Definition 패밀리 이름 (AWS에서 다운로드)'
        required: true
        default: 'devsecops-dev-api-node'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2

jobs:
  deploy:
    name: Build and Deploy ${{ github.event.inputs.service-name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --platform linux/amd64 \
            -t $ECR_REGISTRY/${{ github.event.inputs.ecr-repository }}:$IMAGE_TAG \
            -t $ECR_REGISTRY/${{ github.event.inputs.ecr-repository }}:latest \
            ${{ github.event.inputs.working-directory }}
          docker push $ECR_REGISTRY/${{ github.event.inputs.ecr-repository }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ github.event.inputs.ecr-repository }}:latest
          echo "image=$ECR_REGISTRY/${{ github.event.inputs.ecr-repository }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download current task definition from AWS
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ github.event.inputs.task-definition-family }} \
            --query taskDefinition \
            > task-definition.json

      - name: Render Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ github.event.inputs.container-name }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ github.event.inputs.ecs-service }}
          cluster: ${{ github.event.inputs.ecs-cluster }}
          wait-for-service-stability: true

      - name: Scale service from zero if needed
        shell: bash
        run: |
          CURRENT_DESIRED_COUNT=$(aws ecs describe-services \
            --cluster "${{ github.event.inputs.ecs-cluster }}" \
            --services "${{ github.event.inputs.ecs-service }}" \
            --query 'services[0].desiredCount' \
            --output text)

          if [ "$CURRENT_DESIRED_COUNT" = "0" ]; then
            aws ecs update-service \
              --cluster "${{ github.event.inputs.ecs-cluster }}" \
              --service "${{ github.event.inputs.ecs-service }}" \
              --desired-count 1 >/dev/null
            aws ecs wait services-stable \
              --cluster "${{ github.event.inputs.ecs-cluster }}" \
              --services "${{ github.event.inputs.ecs-service }}"
          fi
