# ============================================
# 로컬 개발 환경 설정 (Day 1-2)
# - H2 Database (MySQL 호환 모드)
# - 로컬 파일 스토리지
# - 인메모리 캐시
# - 동기 큐 처리
# ============================================

spring:
  datasource:
    url: jdbc:h2:file:./data/ecommerce;MODE=MySQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

app:
  db:
    type: h2
  storage:
    type: local
  review:
    store: local
  cache:
    type: memory
  queue:
    type: sync
  aws:
    region: ap-northeast-2
